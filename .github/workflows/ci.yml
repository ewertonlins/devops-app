name: CI Pipeline

on:
    push:
        branches: ["main"]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout codigo
              uses: actions/checkout@v3

             - name: Setup Node
                uses: actions/setup-node@v3
                with:
                    node-version: 18

             - name: Install dependencias
                run: npm install

             - name: Rodar app
               run: node app.js & sleep 5

             - name: Build docker image
               run: docker build -t devops-app